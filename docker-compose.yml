services:
  db:
    image: postgres:16-alpine
    container_name: metaadscrm_db
    environment:
      POSTGRES_DB: metaads_crm
      POSTGRES_USER: metaads
      POSTGRES_PASSWORD: metaads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: metaadscrm_api
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    image: nginx:alpine
    container_name: metaadscrm_frontend
    depends_on:
      - api
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  postgres_data:
